<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Público</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="container" style="padding:2rem 1rem;">
        <div class="card" style="max-width:850px;margin:auto;">
            <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">
                <img id="public-avatar" src="" 
                     style="width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #3b82f6;">

                <div>
                    <h1 id="public-username" style="margin:0;"></h1>
                    <p id="public-email" style="opacity:0.7;margin-top:0.5rem;"></p>
                </div>
            </div>
        </div>

        <div class="card" style="max-width:850px;margin:2rem auto;">
            <h2 style="margin-bottom:1.5rem;">
                <i class="fa-solid fa-folder-open"></i> Recursos públicos
            </h2>

            <div id="public-resources"
                 style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem;">
            </div>
        </div>
    </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const userParam = new URLSearchParams(window.location.search).get("user");

    if(!userParam){
        window.location.href = "dashboard.html";
        return;
    }

    const users = JSON.parse(localStorage.getItem("vault_users_registry")) || [];
    const resources = JSON.parse(localStorage.getItem("vault_public_resources")) || [];

    const user = users.find(u => u.email === userParam || u.username === userParam);

    if(!user){
        alert("Usuario no encontrado");
        window.location.href = "dashboard.html";
        return;
    }

    document.getElementById("public-avatar").src = user.avatar || "https://i.pravatar.cc/150";
    document.getElementById("public-username").innerText = user.username;
    document.getElementById("public-email").innerText = user.email;

    const filtered = resources.filter(r =>
        r.uploaderEmail === user.email || r.uploader === user.username
    );

    const container = document.getElementById("public-resources");

    if(filtered.length === 0){
        container.innerHTML = "<p>Este usuario aún no ha publicado recursos.</p>";
        return;
    }

    container.innerHTML = filtered.map(r => `
        <div class="card">
            <span class="res-badge">
                Público / ${r.category}
            </span>

            <h3 style="margin-top:1rem;">${r.title}</h3>

            <p style="opacity:0.8;font-size:0.92rem;">
                ${r.desc}
            </p>

            <a href="${r.url}" target="_blank" class="btn" style="width:100%;">
                <i class="fa-solid fa-up-right-from-square"></i>
                Abrir recurso
            </a>
        </div>
    `).join("");
});
</script>
</body>
</html>
