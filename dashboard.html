<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda Principal - Resource Vault</title>
    <script>
        (function() {
            const savedTheme = localStorage.getItem("vault-theme") || "dark";
            document.documentElement.setAttribute("data-theme", savedTheme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-vault"></i> Resource<span>Vault</span>
        </a>
        <ul class="nav-links"></ul>
    </nav>

    <main class="main-container">
        
        
<!-- ================= SECCIÓN LOCAL ================= -->
<div class="card">
    <h2 style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
        <i class="fa-solid fa-laptop" style="color:var(--accent);"></i> Mi Bóveda de Recursos
    </h2>
    
    <!-- Requisito: Barra de búsqueda y categorías para el sistema local -->
    <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center;">
        <input type="text" id="search-local" class="form-control" style="flex:1; min-width:250px;" placeholder="Buscar recursos locales por título o descripción...">
        <div id="cats-local-container" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <!-- Renderizado Dinámico de Categorías Locales -->
        </div>
    </div>
    
    <div class="resource-grid" id="grid-local"></div>
</div>

<!-- ================= SECCIÓN PÚBLICA ================= -->
<div class="card" style="margin-top: 2rem;">
    <h2 style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
        <i class="fa-solid fa-earth-americas" style="color:#3b82f6;"></i> Bóveda de recursos publica
    </h2>
    
    <!-- Requisito: Barra de búsqueda y categorías para el sistema público -->
    <div id="public-controls-wrapper" style="display:none; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; align-items:center;">
        <input type="text" id="search-public" class="form-control" style="flex:1; min-width:250px;" placeholder="Buscar recursos públicos compartidos">
        <div id="cats-public-container" style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <!-- Renderizado de Categorías Públicas -->
        </div>
    </div>
    
    <div class="resource-grid" id="grid-public"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        let activeLocalCat = "todos";
        let activePublicCat = "todos";
        let localQuery = "";
        let publicQuery = "";

        // Inicializar Categorías Locales en barra de filtros
        function renderLocalCategoryFilters() {
            const container = document.getElementById("cats-local-container");
            const cats = JSON.parse(localStorage.getItem("vault_local_categories")) || ["documentacion", "cursos", "articulos"];
            
            let html = `<button class="btn-filter ${activeLocalCat === 'todos' ? 'active' : ''}" data-cat="todos">Todos</button>`;
            cats.forEach(c => {
                html += `<button class="btn-filter ${activeLocalCat === c ? 'active' : ''}" data-cat="${c}">${c.toUpperCase()}</button>`;
            });
            container.innerHTML = html;

            container.querySelectorAll(".btn-filter").forEach(b => {
                b.addEventListener("click", () => {
                    activeLocalCat = b.getAttribute("data-cat");
                    renderLocalCategoryFilters();
                    renderLocalGrid();
                });
            });
        }

        // Inicializar Categorías Públicas fijas en barra de filtros
        function renderPublicCategoryFilters() {
            const container = document.getElementById("cats-public-container");
            const cats = ["documentacion", "cursos", "articulos"]; // Fijos por defecto comunitarios
            
            let html = `<button class="btn-filter ${activePublicCat === 'todos' ? 'active' : ''}" data-cat="todos">Todos</button>`;
            cats.forEach(c => {
                html += `<button class="btn-filter ${activePublicCat === c ? 'active' : ''}" data-cat="${c}">${c.toUpperCase()}</button>`;
            });
            container.innerHTML = html;

            container.querySelectorAll(".btn-filter").forEach(b => {
                b.addEventListener("click", () => {
                    activePublicCat = b.getAttribute("data-cat");
                    renderPublicCategoryFilters();
                    renderPublicGrid();
                });
            });
        }

        function renderLocalGrid() {
            const grid = document.getElementById("grid-local");
            const items = JSON.parse(localStorage.getItem("vault_resources")) || [];
            
            const filtered = items.filter(i => {
                const matchesSearch = i.title.toLowerCase().includes(localQuery) || i.desc.toLowerCase().includes(localQuery);
                const matchesCat = (activeLocalCat === "todos") || (i.category === activeLocalCat);
                return matchesSearch && matchesCat;
            });

            grid.innerHTML = "";
            if(filtered.length === 0) {
                grid.innerHTML = `<p style='grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:2rem;'>No hay elementos en tu almacén local.</p>`;
                return;
            }

            filtered.forEach(i => {
                grid.innerHTML += `
                    <div class="card res-card">
                        <div class="res-header">
                            <span class="res-badge">${i.category}</span>
                        </div>
                        <h3 style="font-size:1.1rem; margin-top:0.5rem;">${i.title}</h3>
                        <p style="font-size:0.9rem; margin:0.5rem 0 1.5rem;">${i.desc}</p>
                        <a href="${i.url}" target="_blank" class="btn" style="width:100%; font-size:0.85rem;"><i class="fa-solid fa-up-right-from-square"></i> Abrir Enlace</a>
                    </div>
                `;
            });
        }

        function renderPublicGrid() {
            const grid = document.getElementById("grid-public");
            const isLogged = localStorage.getItem("vault_session") === "true";
            
            if(!isLogged) {
                // Requisito: Mensaje obligatorio abajo si no está logueado
                grid.innerHTML = `
                    <div class="lock-box" style="grid-column: 1/-1;">
                        <i class="fa-solid fa-lock" style="font-size: 2.5rem; color: var(--danger); margin-bottom:1rem;"></i>
                        <h3>Inicia sesión para acceder a los recursos públicos</h3>
                        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Explora los aportes de tus compañeros de la universidad autenticándote.</p>
                        <a href="login.html" class="btn" style="margin-top: 1rem;"><i class="fa-solid fa-right-to-bracket"></i> Conectarse</a>
                    </div>
                `;
                document.getElementById("public-controls-wrapper").style.display = "none";
                return;
            }

            document.getElementById("public-controls-wrapper").style.display = "flex";
            const items = JSON.parse(localStorage.getItem("vault_public_resources")) || [];
            
            const filtered = items.filter(i => {
                const matchesSearch = i.title.toLowerCase().includes(publicQuery) || i.desc.toLowerCase().includes(publicQuery);
                const matchesCat = (activePublicCat === "todos") || (i.category === activePublicCat);
                return matchesSearch && matchesCat;
            });

            grid.innerHTML = "";
            if(filtered.length === 0) {
                grid.innerHTML = `<p style='grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:2rem;'>No hay recursos públicos coincidentes.</p>`;
                return;
            }

            filtered.forEach(i => {
                // Requisito: En una esquina muestra quién lo subió (uploader-tag)
                grid.innerHTML += `
                    <div class="card res-card">
                        <div class="res-header">
                            <span class="res-badge" style="background:rgba(59,130,246,0.1); color:#3b82f6;">Público / ${i.category}</span>
                            <span class="uploader-tag">
                                <i class="fa-solid fa-user-graduate"></i>
                                <a href="public-profile.html?user=${encodeURIComponent(i.uploaderEmail || i.uploader || '')}" 
                                   style="color:inherit; text-decoration:none; font-weight:600;">
                                   ${i.uploader || 'Anónimo'}
                                </a>
                            </span>
                        </div>
                        <h3 style="font-size:1.1rem; margin-top:0.5rem;">${i.title}</h3>
                        <p style="font-size:0.9rem; margin:0.5rem 0 1.5rem;">${i.desc}</p>
                        <a href="${i.url}" target="_blank" class="btn" style="width:100%; font-size:0.85rem; background:#3b82f6;"><i class="fa-solid fa-up-right-from-square"></i> Visualizar recurso</a>
                    </div>
                `;
            });
        }

        // Listeners de búsqueda
        document.getElementById("search-local").addEventListener("input", (e) => {
            localQuery = e.target.value.toLowerCase();
            renderLocalGrid();
        });

        document.getElementById("search-public").addEventListener("input", (e) => {
            publicQuery = e.target.value.toLowerCase();
            renderPublicGrid();
        });

        // Ejecuciones iniciales
        renderLocalCategoryFilters();
        renderPublicCategoryFilters();
        renderLocalGrid();
        renderPublicGrid();
    });
</script>

    
    </main>

    <footer>
        <p>&copy; 2026 Resource Vault - Aplicacion web de centralización de Enlaces.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
